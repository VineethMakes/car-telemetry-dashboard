<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Telemetry Dashboard</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Car Telemetry Dashboard</h1>
            <p>Rust-powered digital twin simulation</p>
        </header>

        <main>
            <div class="dashboard-grid">
                <div class="card metrics-card">
                    <h2>Live Metrics</h2>
                    <div class="metric-row">
                        <span class="label">Speed:</span>
                        <span class="value" id="val-speed">-- km/h</span>
                    </div>
                    <div class="metric-row">
                        <span class="label">RPM:</span>
                        <span class="value" id="val-rpm">--</span>
                    </div>
                    <div class="metric-row">
                        <span class="label">Gear:</span>
                        <span class="value" id="val-gear">--</span>
                    </div>
                    <div class="metric-row">
                        <span class="label">Engine Temp:</span>
                        <span class="value" id="val-temp">-- °C</span>
                    </div>
                </div>

                <div class="card tires-card">
                    <h2>Tire Pressure</h2>
                    <div class="tires-grid">
                        <div class="tire" id="tire-fl">FL: -- PSI</div>
                        <div class="tire" id="tire-fr">FR: -- PSI</div>
                        <div class="tire" id="tire-rl">RL: -- PSI</div>
                        <div class="tire" id="tire-rr">RR: -- PSI</div>
                    </div>
                </div>

                <div class="card alerts-card">
                    <h2>Diagnostics</h2>
                    <ul id="alerts-list">
                        <li class="no-alerts">System Normal</li>
                    </ul>
                </div>
                
                <div class="card 3d-card" style="grid-column: 1 / -1; height: 300px; display: flex; align-items: center; justify-content: center; background: #1a1a1a;">
                    <div id="scene-container" style="width: 100%; height: 100%;"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Include Three.js for a basic 3D car placeholder -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="src/app.js"></script>
</body>
</html>
